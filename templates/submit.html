{% extends "base.html" %}
{% block title %}Submit a Review — FilmReview{% endblock %}
{% block content %}
<section class="form-section">
    <div class="form-header">
        <span class="form-eyebrow">Share your take</span>
        <h1 class="form-title">Write a Review</h1>
    </div>
    <form class="review-form" method="POST" action="{{ url_for('submit') }}">
        <div class="form-group">
            <label class="form-label" for="title">Title</label>
            <input type="text" id="title" name="title" class="form-input" placeholder="e.g. Oppenheimer, The Bear, Dune…" value="{{ form.get('title', '') }}" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Type</label>
                <div class="type-toggle">
                    <label class="type-option">
                        <input type="radio" name="type" value="movie" {% if form.get('type') != 'series' %}checked{% endif %}>
                        <span class="type-label">🎬 Film</span>
                    </label>
                    <label class="type-option">
                        <input type="radio" name="type" value="series" {% if form.get('type') == 'series' %}checked{% endif %}>
                        <span class="type-label">📺 Series</span>
                    </label>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Your Rating</label>
                <div class="star-picker" id="starPicker">
                    {% for i in range(1, 6) %}
                        <input type="radio" name="rating" value="{{ i }}" id="star{{ i }}" {% if form.get('rating') == i|string %}checked{% endif %}>
                        <label for="star{{ i }}" class="star-pick">★</label>
                    {% endfor %}
                </div>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label" for="review_text">
                Your Review
                <span class="char-count" id="charCount">0 / 1000</span>
            </label>
            <textarea id="review_text" name="review_text" class="form-textarea" placeholder="What did you think? No spoilers without warning…" rows="7" maxlength="1000" required>{{ form.get('review_text', '') }}</textarea>
        </div>
        <div class="form-actions">
            <a href="{{ url_for('index') }}" class="btn-secondary">Cancel</a>
            <button type="submit" class="btn-primary">Publish Review →</button>
        </div>
    </form>
</section>
{% endblock %}
