{% extends "base.html" %}
{% block title %}Log In — FilmReview{% endblock %}
{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">◈</span>
            <h1 class="auth-title">Welcome back.</h1>
            <p class="auth-sub">Log in to share your reviews.</p>
        </div>
        <form class="auth-form" method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="Your username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-primary btn-full">Log In →</button>
        </form>
        <p class="auth-switch">
            No account? <a href="{{ url_for('register') }}">Join FilmReview</a>
        </p>
    </div>
</section>
{% endblock %}
